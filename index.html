<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Photo Gallery</h1>
        <p>Hover over or use the Tab key to focus on an image to view it below.</p>
    </header>

    <div id="gallery-display">
        Hover or Tab over an image below to display it here.
    </div>

    <main class="thumbnail-container">
        <img class="preview" alt="Serene mountain lake at sunrise" src="https://picsum.photos/id/10/200/200">
        <img class="preview" alt="Golden desert dunes stretching into the horizon" src="https://picsum.photos/id/16/200/200">
        <img class="preview" alt="Lush green forest canopy from below" src="https://picsum.photos/id/28/200/200">
        <img class="preview" alt="Crashing ocean waves on a rocky shore" src="https://picsum.photos/id/48/200/200">
        <img class="preview" alt="Close-up of vibrant autumn leaves" src="https://picsum.photos/id/60/200/200">
        <img class="preview" alt="City skyline illuminated at night" src="https://picsum.photos/id/84/200/200">
    </main>

    <script src="gallery.js"></script>
</body>
</html>
